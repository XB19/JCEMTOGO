<form method="post" action="{% url 'backoffice:update_order_status' order.pk %}" class="status-form">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.path }}">
  <select name="status" class="status-select" onchange="this.form.requestSubmit()" aria-label="Changer le statut de la commande {{ order.order_reference }}">
    {% for value, label in status_choices %}
      <option value="{{ value }}" {% if value == order.status %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</form>
